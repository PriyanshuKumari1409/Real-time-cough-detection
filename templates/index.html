
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Cough Detection</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 26px;
            color: #333;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        button {
            margin-top: 25px;
            padding: 14px;
            width: 100%;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #28a745;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #218838;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
        }

        .cough {
            color: #dc3545;
        }

        .nocough {
            color: #28a745;
        }

        .progress-container {
            margin-top: 15px;
            background: #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            height: 16px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #28a745;
            transition: width 0.4s ease;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="card">
    <h1> Real-Time Cough Detection</h1>


    <button id="recordBtn" onclick="recordAudio()">Record & Predict</button>

    <div id="status"></div>

    <div class="progress-container">
        <div id="confidenceBar" class="progress-bar"></div>
    </div>

    <div id="result" class="result"></div>

    <footer>Using  CNN &  MFCC</footer>
</div>

<script>
async function recordAudio() {
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const button = document.getElementById("recordBtn");
    const bar = document.getElementById("confidenceBar");

    result.innerText = "";
    bar.style.width = "0%";

    status.innerText = "🎙 Recording... please cough if needed";
    button.disabled = true;

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mediaRecorder = new MediaRecorder(stream);
    let chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.start();

    setTimeout(() => mediaRecorder.stop(), 1000);

    mediaRecorder.onstop = async () => {
        status.innerText = "⏳ Analyzing audio...";

        const blob = new Blob(chunks, { type: "audio/wav" });
        const formData = new FormData();
        formData.append("audio", blob);

        try {
            const response = await fetch("/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            const confidence = Math.round(data.confidence * 100);

            bar.style.width = confidence + "%";
            bar.style.background = data.prediction === "Cough" ? "#dc3545" : "#397b30ff";

            result.innerHTML = `
                <span class="${data.prediction === 'Cough' ? 'cough' : 'nocough'}">
                    ${data.prediction}
                </span>
                <br>
                <small>Confidence: ${confidence}%</small>
            `;

           
        } catch (err) {
            status.innerText = " Error processing audio";
            console.error(err);
        }

        button.disabled = false;
        stream.getTracks().forEach(track => track.stop());
    };
}
</script>

</body>
</html>
